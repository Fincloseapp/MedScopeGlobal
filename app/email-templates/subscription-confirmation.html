<html lang="cs">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Potvrzení předplatného</title></head>

  <table role="presentation" width="100%" style="padding:24px"><tr><td align="center">
    <table role="presentation" width="600" style="max-width:600px;background:#fff;border-radius:12px">
      <tr><td style="background:#005B96;padding:20px;text-align:center;color:#fff"><strong>MedScopeGlobal</strong></td></tr>
      <tr><td style="padding:28px;color:#021d33">
        <h2 style="margin-top:0">Předplatné aktivováno</h2>
        <p>Plán: <strong>{{planName}}</strong></p>

        <p>Děkujeme za podporu nezávislého zdravotnického obsahu.</p>
      </td></tr>
    </table>
  </td></tr></table>
