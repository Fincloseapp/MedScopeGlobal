name: Refresh AI content cache

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

jobs:
  refresh-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run refresh:content
      - name: Commit refreshed cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/content-cache.json
          git diff --cached --quiet || git commit -m "Refresh AI content cache"
          git push
