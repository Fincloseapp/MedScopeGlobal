name: v25 Nav Monitor (5 min)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  nav-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Ping v25 nav monitor
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://medscopeglobal.com/api/cron/v25-nav-monitor" \
            || exit 1
