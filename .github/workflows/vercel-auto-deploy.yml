name: Vercel Auto Deploy

# Vercel Git Integration handles production deploys on push to main.
# This workflow documents the pipeline — no build or deploy steps here.

on:
  push:
    branches: [main]

concurrency:
  group: vercel-auto-deploy-main
  cancel-in-progress: false

jobs:
  vercel-git-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Production deploy via Vercel Git Integration
        run: |
          echo "Push to main → Vercel automatic production deployment"
          echo "Project: medscopeglobal"
          echo "Domain:  https://medscopeglobal.com"
          echo "Branch:  main (production)"
          echo ""
          echo "Vercel will:"
          echo "  1. Pull commit from GitHub"
          echo "  2. npm install"
          echo "  3. npm run build (pre-deploy gates + verify-build-version + next build)"
          echo "  4. Promote to production alias medscopeglobal.com"
          echo "  5. www.medscopeglobal.com → redirect to medscopeglobal.com"
          echo ""
          echo "No GitHub secrets or manual deploy steps required."
          echo ""
          echo "Local auto-git (Cursor hook): save file → auto commit + push → Vercel deploy"
