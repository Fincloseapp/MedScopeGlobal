name: Deploy V17

on:
  push:
    branches: ["main"]

concurrency:
  group: v17-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SITE_URL: https://medscopeglobal.com
      V17_HEALTH_URL: https://medscopeglobal.com/api/v17/health
      V17_MONITORING_URL: https://medscopeglobal.com/api/v17/monitoring

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify V17
        run: npm run verify-v17
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Local Healthcheck
        run: npm run healthcheck-local

      - name: Deploy to Vercel
        if: success()
        run: node scripts/deploy/vercel_production.mjs --skip-gates
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Production monitoring check
        if: success()
        run: |
          node -e "
          const url = process.env.V17_MONITORING_URL;
          fetch(url, { signal: AbortSignal.timeout(20000) })
            .then(async (res) => {
              const body = await res.json();
              if (!res.ok) throw new Error('monitoring HTTP ' + res.status);
              if (!body.metrics || !body.version) throw new Error('invalid monitoring snapshot');
              console.log(JSON.stringify({ ok: true, version: body.version, requestsLastHour: body.metrics.requestsLastHour }));
            })
            .catch((err) => { console.error(err.message || err); process.exit(1); });
          "

      - name: Rollback if failed
        if: failure()
        run: node scripts/deploy/vercel_rollback.mjs
