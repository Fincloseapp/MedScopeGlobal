name: Apply Academy B2B CME Migration

on:
  workflow_dispatch:
  push:
    paths:
      - "supabase/migrations/20260718120000_academy_b2b_cme.sql"
      - "supabase/migrations/20260718120100_academy_b2b_cme_seed.sql"
      - "scripts/ci-apply-academy-b2b-migration.mjs"
      - ".github/workflows/apply-academy-b2b-migration.yml"
    branches:
      - main

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install tools
        run: |
          npm install -g vercel@latest
          npm install pg@8.13.1 --no-save

      - name: Pull production env from Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          # Prefer REST decrypt path — CLI pull often writes literal [SENSITIVE]
          node scripts/ci-pull-vercel-env-decrypted.mjs ./.env.production.pulled
          cp ./.env.production.pulled ./medscope.env.local
          # Also keep CLI pull for comparison metadata
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN" || true
          echo "pulled_env_lines=$(wc -l < ./medscope.env.local)"

      - name: Apply B2B CME SQL migrations
        id: apply_sql
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DATABASE: ${{ secrets.POSTGRES_DATABASE }}
        run: node scripts/ci-apply-academy-b2b-migration.mjs ./.env.production.pulled

      - name: Fallback via production setup API
        if: steps.apply_sql.outcome != 'success'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          test -n "${CRON_SECRET:-}"
          body="$(curl -sS -w "\nHTTP_STATUS:%{http_code}" "https://medscopeglobal.com/api/setup/academy-b2b-schema?secret=${CRON_SECRET}")"
          echo "$body"
          echo "$body" | grep -q 'HTTP_STATUS:200'
          echo "Fallback setup API OK"

      - name: Upload env for local restore
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: medscope-env-local
          path: medscope.env.local
          retention-days: 1
          if-no-files-found: warn
          include-hidden-files: true
