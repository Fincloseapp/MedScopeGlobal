name: Apply Academy B2B CME Migration

on:
  workflow_dispatch:
  push:
    paths:
      - "supabase/migrations/20260718120000_academy_b2b_cme.sql"
      - "supabase/migrations/20260718120100_academy_b2b_cme_seed.sql"
      - "scripts/ci-apply-academy-b2b-migration.mjs"
      - ".github/workflows/apply-academy-b2b-migration.yml"
    branches:
      - main

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install tools
        run: |
          npm install -g vercel@latest
          npm install pg@8.13.1 --no-save

      - name: Pull production env from Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          cp .vercel/.env.production.local ./.env.production.pulled
          cp .vercel/.env.production.local ./medscope.env.local
          cp .vercel/.env.production.local ./.env.local
          test -s ./.env.production.pulled
          echo "pulled_env_lines=$(wc -l < ./.env.production.pulled)"

      - name: Apply B2B CME SQL migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: node scripts/ci-apply-academy-b2b-migration.mjs ./.env.production.pulled

      - name: Upload env for local restore
        uses: actions/upload-artifact@v4
        with:
          name: medscope-env-local
          path: medscope.env.local
          retention-days: 1
          if-no-files-found: error
