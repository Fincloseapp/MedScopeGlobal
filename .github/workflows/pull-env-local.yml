name: Pull Production Env Local

on:
  workflow_dispatch:

jobs:
  pull-env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel production env
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          cp .vercel/.env.production.local ./medscope.env.local
          test -s ./medscope.env.local
          echo "env_lines=$(wc -l < ./medscope.env.local)"

      - name: Upload env artifact
        uses: actions/upload-artifact@v4
        with:
          name: medscope-env-local
          path: medscope.env.local
          retention-days: 1
          if-no-files-found: error
