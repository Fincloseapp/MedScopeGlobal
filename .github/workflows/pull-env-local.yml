name: Pull Production Env Local

# Reconstructs .env.local from Vercel production for the D: workspace.
on:
  workflow_dispatch:

jobs:
  pull-env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel production env
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          if [ -f .vercel/.env.production.local ]; then
            cp .vercel/.env.production.local ./medscope.env.local
            cp .vercel/.env.production.local ./.env.local
          else
            vercel env pull ./medscope.env.local --environment=production --token="$VERCEL_TOKEN" --yes
            cp ./medscope.env.local ./.env.local
          fi
          test -s ./medscope.env.local
          echo "env_lines=$(wc -l < ./medscope.env.local)"

      - name: Upload env artifact
        uses: actions/upload-artifact@v4
        with:
          name: medscope-env-local
          path: |
            medscope.env.local
            .env.local
          retention-days: 1
          include-hidden-files: true
          if-no-files-found: error
