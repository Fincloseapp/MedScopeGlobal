<!DOCTYPE html>
<html lang="cs">
<head><meta charset="utf-8"><title>Faktura {{invoiceId}}</title></head>
<body style="font-family:system-ui,sans-serif;color:#021d33;max-width:640px;margin:0 auto;padding:24px">
  <h1 style="color:#005B96">Faktura {{invoiceId}}</h1>
  <p>Datum: {{date}}</p>
  <p>Odběratel: {{customerName}}</p>
  <table width="100%" style="border-collapse:collapse;margin:20px 0">
    <tr style="background:#f1f5f9"><th style="padding:8px;text-align:left">Položka</th><th style="padding:8px;text-align:right">Částka</th></tr>
    <tr><td style="padding:8px;border-bottom:1px solid #e2e8f0">{{description}}</td><td style="padding:8px;border-bottom:1px solid #e2e8f0;text-align:right">{{amount}}</td></tr>
  </table>
  <p><strong>DPH:</strong> {{vat}} · <strong>Celkem:</strong> {{total}}</p>
</body>
</html>
